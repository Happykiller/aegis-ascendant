<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <!-- Cadre du HUD forteresse — version ajustée au contenu (12/07/2026), même
       traitement que le cadre chasseur. L'original portait deux panneaux de
       ~530x246 px, des traits décoratifs orphelins en #3FD9E8 (couleur RESERVEE
       au tir allié) et une pastille cyan flottant au centre-haut, DANS la zone
       de jeu — juste sous la barre de vie du boss.
       Ici : deux panneaux serrés, accents or #E4B54A (signature Aegis, qui
       distingue la forteresse du chasseur), et plus rien qui empiète sur le champ. -->

  <g fill="#070A12" fill-opacity=".55" stroke="#1C2B5E" stroke-width="3">
    <path d="M32 46h396l36 36v66l-24 24H32Z"/>
    <path d="M1888 46h-236l-32 32v54l24 24h244Z"/>
  </g>

  <g fill="none" stroke="#E4B54A" stroke-width="3" stroke-opacity=".6">
    <path d="M32 46h54M1888 46h-54"/>
  </g>
</svg>
